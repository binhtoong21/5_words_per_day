events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name vocab.example.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name vocab.example.com;

        # These will fail to load if certificates don't exist yet, 
        # so initial run requires a dummy cert or commenting this out briefly 
        # while certbot creates the real certificate.
        ssl_certificate /etc/letsencrypt/live/vocab.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vocab.example.com/privkey.pem;

        location /api/ {
            proxy_pass http://api:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://web:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
